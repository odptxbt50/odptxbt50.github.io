<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag - PatGames</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            font-family: 'Courier New', monospace;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        #menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 16px;
        }

        #menu h1 {
            font-size: 4rem;
            background: linear-gradient(135deg, #ff006a, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #menu .subtitle {
            color: #888;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .menu-btn {
            padding: 14px 40px;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e, #2a2a4a);
            border: 2px solid #00f0ff;
            color: #00f0ff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .menu-btn:hover {
            background: #00f0ff;
            color: #0a0a0f;
            transform: scale(1.05);
        }

        .setting-row {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #aaa;
            font-size: 0.9rem;
        }

        .setting-row label { color: #ccc; }

        .setting-row input {
            width: 70px;
            padding: 6px 10px;
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            background: #1a1a2e;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            text-align: center;
        }

        .player-select {
            display: flex;
            gap: 12px;
        }

        .player-select button {
            padding: 10px 20px;
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            background: #1a1a2e;
            border: 2px solid #555;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .player-select button.active {
            border-color: #00ff88;
            color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
        }

        .player-select button:hover { border-color: #00ff88; }

        #game {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #arena {
            width: 100%;
            height: 100%;
            background: #0d0d1a;
            position: relative;
            overflow: hidden;
        }

        #arena::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .player {
            position: absolute;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #000;
            z-index: 10;
        }

        .player.it {
            box-shadow: 0 0 20px 8px rgba(255, 0, 0, 0.6);
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        .player.invincible {
            box-shadow: 0 0 18px 6px rgba(0, 200, 255, 0.7) !important;
            animation: shieldPulse 0.4s ease-in-out infinite alternate !important;
        }

        .player.speedy {
            filter: brightness(1.5);
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        @keyframes shieldPulse {
            from { transform: scale(1); filter: brightness(1); }
            to { transform: scale(1.1); filter: brightness(1.4); }
        }

        .player-label {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #fff;
            white-space: nowrap;
            pointer-events: none;
        }

        .wall {
            position: absolute;
            background: linear-gradient(135deg, #2a2a4a, #3a3a5a);
            border: 2px solid #555;
            border-radius: 4px;
            z-index: 5;
        }

        .teleporter {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            z-index: 6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            animation: tpGlow 1.5s ease-in-out infinite alternate;
        }

        .teleporter.pair-a {
            background: radial-gradient(circle, rgba(180, 0, 255, 0.6), rgba(180, 0, 255, 0.1));
            border: 2px solid #b400ff;
            box-shadow: 0 0 12px rgba(180, 0, 255, 0.5);
        }

        @keyframes tpGlow {
            from { filter: brightness(0.8); }
            to { filter: brightness(1.3); }
        }

        .powerup {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            z-index: 7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            animation: powerFloat 1s ease-in-out infinite alternate;
        }

        .powerup.speed {
            background: radial-gradient(circle, rgba(0, 255, 100, 0.7), rgba(0, 255, 100, 0.1));
            border: 2px solid #00ff64;
            box-shadow: 0 0 10px rgba(0, 255, 100, 0.5);
        }

        .powerup.shield {
            background: radial-gradient(circle, rgba(0, 180, 255, 0.7), rgba(0, 180, 255, 0.1));
            border: 2px solid #00b4ff;
            box-shadow: 0 0 10px rgba(0, 180, 255, 0.5);
        }

        .powerup.tagger {
            background: radial-gradient(circle, rgba(255, 0, 0, 0.7), rgba(255, 0, 0, 0.1));
            border: 2px solid #ff0000;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            animation: powerFloat 0.6s ease-in-out infinite alternate;
        }

        @keyframes powerFloat {
            from { transform: translateY(0); }
            to { transform: translateY(-4px); }
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        #hud .timer {
            font-size: 2rem;
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        #hud .it-indicator {
            font-size: 1rem;
            color: #ff006a;
            background: rgba(255, 0, 106, 0.15);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #ff006a;
        }

        #powerup-status {
            position: absolute;
            top: 50px;
            right: 10px;
            z-index: 100;
            pointer-events: none;
            font-size: 0.75rem;
            text-align: right;
            line-height: 1.8;
        }

        #scoreboard {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 100;
            pointer-events: none;
        }

        .score-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 8px;
        }

        .score-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        #controls-info {
            position: absolute;
            bottom: 50px;
            left: 10px;
            font-size: 0.7rem;
            color: #555;
            z-index: 100;
            pointer-events: none;
        }

        #gameover {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        #gameover h2 {
            font-size: 2.5rem;
            color: #00ff88;
        }

        #gameover .results {
            font-size: 1.2rem;
            color: #ccc;
            text-align: center;
            line-height: 2;
        }

        .back-btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            background: #1a1a2e;
            border: 2px solid #00f0ff;
            color: #00f0ff;
            border-radius: 8px;
            cursor: pointer;
            pointer-events: all;
        }

        .back-btn:hover {
            background: #00f0ff;
            color: #0a0a0f;
        }

        .controls-legend {
            margin-top: 20px;
            color: #666;
            font-size: 0.75rem;
            text-align: center;
            line-height: 2;
        }

        .controls-legend span { font-weight: bold; }
    </style>
</head>
<body>
    <div id="menu">
        <h1>TAG</h1>
        <p class="subtitle">Local Multiplayer — Chase & Evade!</p>

        <p style="color:#666; font-size:0.85rem;">Players:</p>
        <div class="player-select">
            <button onclick="setPlayers(2)">2</button>
            <button onclick="setPlayers(3)">3</button>
            <button onclick="setPlayers(4)" class="active">4</button>
        </div>

        <div class="setting-row">
            <label>Time (seconds):</label>
            <input type="number" id="timeInput" value="60" min="10" max="300" step="10">
        </div>

        <button class="menu-btn" onclick="startGame()">START GAME</button>

        <div class="controls-legend">
            <div><span style="color:#ff006a">P1:</span> W A S D</div>
            <div><span style="color:#00f0ff">P2:</span> I J K L</div>
            <div><span style="color:#00ff88">P3:</span> ↑ ← ↓ →</div>
            <div><span style="color:#ffcc00">P4:</span> G V B N</div>
        </div>
    </div>

    <div id="game">
        <div id="arena"></div>
        <div id="hud">
            <div class="timer" id="timer">60</div>
            <div class="it-indicator" id="itIndicator">P1 is IT!</div>
        </div>
        <div id="powerup-status"></div>
        <div id="scoreboard"></div>
        <div id="controls-info">
            P1: WASD | P2: IJKL | P3: Arrows | P4: GVBN
        </div>
        <div id="gameover">
            <h2>GAME OVER!</h2>
            <div class="results" id="results"></div>
            <button class="back-btn" onclick="backToMenu()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const PLAYER_COLORS = ['#ff006a', '#00f0ff', '#00ff88', '#ffcc00'];
        const PLAYER_NAMES = ['P1', 'P2', 'P3', 'P4'];
        const SPEED = 4.5;
        const TAG_COOLDOWN = 1000;
        const PLAYER_SIZE = 36;
        const TP_SIZE = 40;
        const POWERUP_SIZE = 30;

        const CONTROLS = [
            { up: 'w', down: 's', left: 'a', right: 'd' },
            { up: 'i', down: 'k', left: 'j', right: 'l' },
            { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' },
            { up: 'g', down: 'b', left: 'v', right: 'n' }
        ];

        let numPlayers = 4;
        let gameDuration = 60;
        let players = [];
        let walls = [];
        let teleporters = [];
        let powerups = []; // {x, y, type, el}
        let itPlayer = 0;
        let previousIt = -1; // Track previous tagger for no-tagback
        let gameRunning = false;
        let timeLeft = 60;
        let timerInterval;
        let powerupInterval;
        let keys = {};
        let lastTagTime = 0;
        let scores = [];

        // Player power states
        let playerBuffs = []; // [{speed: false, speedTimer: 0, invincible: false, invTimer: 0}, ...]

        function setPlayers(n) {
            numPlayers = n;
            document.querySelectorAll('.player-select button').forEach((btn, i) => {
                btn.classList.toggle('active', i === n - 2);
            });
        }

        // ── WALL GENERATION (no overlaps) ──
        function wallsOverlap(a, b) {
            return a.x < b.x + b.width + 10 &&
                   a.x + a.width + 10 > b.x &&
                   a.y < b.y + b.height + 10 &&
                   a.y + a.height + 10 > b.y;
        }

        function generateWalls() {
            walls = [];
            const w = window.innerWidth;
            const h = window.innerHeight;
            const margin = 100;
            const numWalls = 6 + Math.floor(Math.random() * 5);
            let attempts = 0;

            while (walls.length < numWalls && attempts < 200) {
                attempts++;
                const isHorizontal = Math.random() > 0.5;
                let wall;
                if (isHorizontal) {
                    wall = {
                        x: margin + Math.random() * (w - margin * 2 - 200),
                        y: margin + Math.random() * (h - margin * 2 - 12),
                        width: 80 + Math.random() * 150,
                        height: 12
                    };
                } else {
                    wall = {
                        x: margin + Math.random() * (w - margin * 2 - 12),
                        y: margin + Math.random() * (h - margin * 2 - 200),
                        width: 12,
                        height: 80 + Math.random() * 150
                    };
                }

                // Check overlap with existing walls
                let overlaps = false;
                for (const existing of walls) {
                    if (wallsOverlap(wall, existing)) {
                        overlaps = true;
                        break;
                    }
                }
                if (!overlaps) {
                    walls.push(wall);
                }
            }
        }

        // ── TELEPORTERS ──
        function generateTeleporters() {
            teleporters = [];
            spawnTeleporterPair();
        }

        function spawnTeleporterPair() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            const margin = 100;

            const x1 = margin + Math.random() * (w / 2 - margin * 2);
            const y1 = margin + Math.random() * (h - margin * 2);
            const x2 = w / 2 + Math.random() * (w / 2 - margin * 2);
            const y2 = margin + Math.random() * (h - margin * 2);

            const arena = document.getElementById('arena');

            const tp1 = { x: x1, y: y1, used: false, el: null };
            const tp2 = { x: x2, y: y2, used: false, el: null };

            const el1 = document.createElement('div');
            el1.className = 'teleporter pair-a';
            el1.style.left = x1 + 'px';
            el1.style.top = y1 + 'px';
            el1.textContent = '◉';
            arena.appendChild(el1);
            tp1.el = el1;

            const el2 = document.createElement('div');
            el2.className = 'teleporter pair-a';
            el2.style.left = x2 + 'px';
            el2.style.top = y2 + 'px';
            el2.textContent = '◉';
            arena.appendChild(el2);
            tp2.el = el2;

            teleporters = [tp1, tp2];
        }

        function renderWalls(arena) {
            walls.forEach(wall => {
                const el = document.createElement('div');
                el.className = 'wall';
                el.style.left = wall.x + 'px';
                el.style.top = wall.y + 'px';
                el.style.width = wall.width + 'px';
                el.style.height = wall.height + 'px';
                arena.appendChild(el);
            });
        }

        function collidesWithWall(x, y, size) {
            for (const wall of walls) {
                if (x < wall.x + wall.width &&
                    x + size > wall.x &&
                    y < wall.y + wall.height &&
                    y + size > wall.y) {
                    return true;
                }
            }
            return false;
        }

        function checkTeleport(playerIdx) {
            const p = players[playerIdx];
            const px = p.x + PLAYER_SIZE / 2;
            const py = p.y + PLAYER_SIZE / 2;

            for (let i = 0; i < teleporters.length; i++) {
                const tp = teleporters[i];
                if (tp.used) continue;

                const tpCx = tp.x + TP_SIZE / 2;
                const tpCy = tp.y + TP_SIZE / 2;
                const dist = Math.sqrt((px - tpCx) ** 2 + (py - tpCy) ** 2);

                if (dist < 28) {
                    const partner = teleporters.find(t => t !== tp && !t.used);
                    if (partner) {
                        p.x = partner.x + TP_SIZE / 2 - PLAYER_SIZE / 2;
                        p.y = partner.y + TP_SIZE / 2 - PLAYER_SIZE / 2;

                        tp.used = true;
                        partner.used = true;
                        tp.el.remove();
                        partner.el.remove();

                        if (gameRunning) {
                            setTimeout(() => {
                                if (gameRunning) spawnTeleporterPair();
                            }, 5000);
                        }
                        return;
                    }
                }
            }
        }

        // ── POWERUPS ──
        function spawnPowerup() {
            if (!gameRunning) return;
            const w = window.innerWidth;
            const h = window.innerHeight;
            const margin = 80;

            // Decide type: speed (40%), shield/invincibility (40%), tagger-swap (20% but very rare spawn)
            const roll = Math.random();
            let type;
            if (roll < 0.4) type = 'speed';
            else if (roll < 0.8) type = 'shield';
            else type = 'tagger'; // rare

            const x = margin + Math.random() * (w - margin * 2);
            const y = margin + Math.random() * (h - margin * 2);

            const arena = document.getElementById('arena');
            const el = document.createElement('div');
            el.className = `powerup ${type}`;

            if (type === 'speed') el.textContent = '⚡';
            else if (type === 'shield') el.textContent = '🛡️';
            else el.textContent = '💀';

            el.style.left = x + 'px';
            el.style.top = y + 'px';
            arena.appendChild(el);

            powerups.push({ x, y, type, el });

            // Powerup disappears after 8 seconds if not picked up
            setTimeout(() => {
                const idx = powerups.findIndex(p => p.el === el);
                if (idx !== -1) {
                    powerups[idx].el.remove();
                    powerups.splice(idx, 1);
                }
            }, 8000);
        }

        function checkPowerupPickup(playerIdx) {
            const p = players[playerIdx];
            const px = p.x + PLAYER_SIZE / 2;
            const py = p.y + PLAYER_SIZE / 2;

            for (let i = powerups.length - 1; i >= 0; i--) {
                const pu = powerups[i];
                const dx = px - (pu.x + POWERUP_SIZE / 2);
                const dy = py - (pu.y + POWERUP_SIZE / 2);
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 30) {
                    // Tagger powerup: only non-IT players can pick it up
                    if (pu.type === 'tagger') {
                        if (playerIdx === itPlayer) continue; // IT can't pick up tagger powerup
                        // Instantly make the picker become IT (swap roles — hurts them!)
                        // Actually: this gives to someone NOT it — it forces THEM to be it
                        // Re-reading: "one for the tagger to use but give to someone that's not it"
                        // This means: it helps the tagger — it makes a random non-it person become it
                        // But only non-it can pick it up... Let me re-read:
                        // "one for the tagger to use but very rare to come up and its give to someone thats not it"
                        // = A powerup that only non-IT players can pick up, and it's for the tagger's benefit
                        // = When a non-IT player picks it up, THEY become IT (bad for them, helps tagger)
                        previousIt = itPlayer;
                        itPlayer = playerIdx;
                        lastTagTime = Date.now();
                        updateItDisplay();
                    } else if (pu.type === 'speed') {
                        playerBuffs[playerIdx].speed = true;
                        players[playerIdx].el.classList.add('speedy');
                        setTimeout(() => {
                            playerBuffs[playerIdx].speed = false;
                            players[playerIdx].el.classList.remove('speedy');
                        }, 4000);
                    } else if (pu.type === 'shield') {
                        if (playerIdx === itPlayer) continue; // IT can't use shield
                        playerBuffs[playerIdx].invincible = true;
                        players[playerIdx].el.classList.add('invincible');
                        setTimeout(() => {
                            playerBuffs[playerIdx].invincible = false;
                            players[playerIdx].el.classList.remove('invincible');
                        }, 3000);
                    }

                    pu.el.remove();
                    powerups.splice(i, 1);
                    break;
                }
            }
        }

        function updatePowerupStatus() {
            let html = '';
            for (let i = 0; i < numPlayers; i++) {
                const buffs = [];
                if (playerBuffs[i].speed) buffs.push('⚡');
                if (playerBuffs[i].invincible) buffs.push('🛡️');
                if (buffs.length > 0) {
                    html += `<div style="color:${PLAYER_COLORS[i]}">${PLAYER_NAMES[i]}: ${buffs.join(' ')}</div>`;
                }
            }
            document.getElementById('powerup-status').innerHTML = html;
        }

        // ── GAME START ──
        function startGame() {
            gameDuration = parseInt(document.getElementById('timeInput').value) || 60;
            gameDuration = Math.max(10, Math.min(300, gameDuration));

            document.getElementById('menu').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            document.getElementById('gameover').style.display = 'none';

            const arena = document.getElementById('arena');
            arena.innerHTML = '';

            players = [];
            powerups = [];
            scores = new Array(numPlayers).fill(0);
            playerBuffs = [];
            for (let i = 0; i < numPlayers; i++) {
                playerBuffs.push({ speed: false, invincible: false });
            }
            timeLeft = gameDuration;
            lastTagTime = 0;
            previousIt = -1;
            p1GodMode = false;

            const w = window.innerWidth;
            const h = window.innerHeight;

            generateWalls();
            generateTeleporters();
            renderWalls(arena);

            const spawns = [
                { x: 50, y: 50 },
                { x: w - 90, y: 50 },
                { x: 50, y: h - 90 },
                { x: w - 90, y: h - 90 }
            ];

            for (let i = 0; i < numPlayers; i++) {
                const el = document.createElement('div');
                el.className = 'player';
                el.id = `player${i}`;
                el.style.background = PLAYER_COLORS[i];
                el.innerHTML = `<span class="player-label">${PLAYER_NAMES[i]}</span>${i + 1}`;
                el.style.left = spawns[i].x + 'px';
                el.style.top = spawns[i].y + 'px';
                arena.appendChild(el);

                players.push({
                    el,
                    x: spawns[i].x,
                    y: spawns[i].y
                });
            }

            itPlayer = Math.floor(Math.random() * numPlayers);
            previousIt = -1;
            updateItDisplay();

            const sb = document.getElementById('scoreboard');
            sb.innerHTML = '';
            for (let i = 0; i < numPlayers; i++) {
                const item = document.createElement('div');
                item.className = 'score-item';
                item.innerHTML = `<div class="score-dot" style="background:${PLAYER_COLORS[i]}"></div><span id="score${i}">${PLAYER_NAMES[i]}: 0.0s</span>`;
                sb.appendChild(item);
            }

            gameRunning = true;
            document.getElementById('timer').textContent = timeLeft;

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);

            // Spawn powerups every 5-8 seconds (tagger powerup is rarer due to type roll)
            powerupInterval = setInterval(() => {
                if (gameRunning && Math.random() < 0.7) spawnPowerup();
            }, 5000);

            requestAnimationFrame(gameLoop);
        }

        function updateItDisplay() {
            players.forEach((p, i) => {
                if (i === itPlayer) {
                    p.el.classList.add('it');
                } else {
                    p.el.classList.remove('it');
                }
            });
            document.getElementById('itIndicator').textContent = `${PLAYER_NAMES[itPlayer]} is IT!`;
            document.getElementById('itIndicator').style.borderColor = PLAYER_COLORS[itPlayer];
            document.getElementById('itIndicator').style.color = PLAYER_COLORS[itPlayer];
        }

        // ── GAME LOOP ──
        function gameLoop() {
            if (!gameRunning) return;

            const w = window.innerWidth;
            const h = window.innerHeight;

            scores[itPlayer] += 1 / 60;
            for (let i = 0; i < numPlayers; i++) {
                document.getElementById(`score${i}`).textContent = `${PLAYER_NAMES[i]}: ${scores[i].toFixed(1)}s`;
            }

            // Move players
            for (let i = 0; i < numPlayers; i++) {
                const c = CONTROLS[i];
                let dx = 0, dy = 0;

                if (keys[c.left]) dx -= 1;
                if (keys[c.right]) dx += 1;
                if (keys[c.up]) dy -= 1;
                if (keys[c.down]) dy += 1;

                if (dx !== 0 && dy !== 0) {
                    dx *= 0.707;
                    dy *= 0.707;
                }

                let speed = i === itPlayer ? SPEED * 1.1 : SPEED;
                if (playerBuffs[i].speed) speed *= 1.6;
                if (i === 0 && p1GodMode) speed = SPEED * 2;

                let newX = players[i].x + dx * speed;
                newX = Math.max(0, Math.min(w - PLAYER_SIZE, newX));
                if (!collidesWithWall(newX, players[i].y, PLAYER_SIZE)) {
                    players[i].x = newX;
                }

                let newY = players[i].y + dy * speed;
                newY = Math.max(0, Math.min(h - PLAYER_SIZE, newY));
                if (!collidesWithWall(players[i].x, newY, PLAYER_SIZE)) {
                    players[i].y = newY;
                }

                players[i].el.style.left = players[i].x + 'px';
                players[i].el.style.top = players[i].y + 'px';

                checkTeleport(i);
                checkPowerupPickup(i);
            }

            // Tag collision with no-tagback rules
            const now = Date.now();
            if (now - lastTagTime > TAG_COOLDOWN) {
                for (let i = 0; i < numPlayers; i++) {
                    if (i === itPlayer) continue;

                    // P1 god mode = can't be tagged
                    if (i === 0 && p1GodMode) continue;

                    // Invincibility powerup
                    if (playerBuffs[i].invincible) continue;

                    // No tag-back rules:
                    // 4 players: no tag-backs at all
                    // 3 players: no tag-backs at all  
                    // 2 players: tag-backs allowed (only option)
                    if (numPlayers >= 3 && i === previousIt) continue;

                    const ddx = (players[itPlayer].x + PLAYER_SIZE/2) - (players[i].x + PLAYER_SIZE/2);
                    const ddy = (players[itPlayer].y + PLAYER_SIZE/2) - (players[i].y + PLAYER_SIZE/2);
                    const dist = Math.sqrt(ddx * ddx + ddy * ddy);

                    if (dist < PLAYER_SIZE) {
                        previousIt = itPlayer;
                        itPlayer = i;
                        lastTagTime = now;
                        updateItDisplay();
                        break;
                    }
                }
            }

            updatePowerupStatus();
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            clearInterval(powerupInterval);

            const ranked = players.map((_, i) => i).sort((a, b) => scores[a] - scores[b]);

            let html = '';
            ranked.forEach((idx, rank) => {
                const medal = rank === 0 ? '👑 ' : '';
                html += `<div style="color:${PLAYER_COLORS[idx]}">${medal}${rank + 1}. ${PLAYER_NAMES[idx]} — ${scores[idx].toFixed(1)}s as IT</div>`;
            });

            document.getElementById('results').innerHTML = html;
            document.getElementById('gameover').style.display = 'flex';
        }

        function backToMenu() {
            gameRunning = false;
            clearInterval(timerInterval);
            clearInterval(powerupInterval);
            document.getElementById('game').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
        }

        // ── SECRET CODE (qeqqqeq) ──
        let secretBuffer = '';
        const SECRET_CODE = 'qeqqqeq';
        let p1GodMode = false;

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            keys[e.key.toLowerCase()] = true;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }

            if (gameRunning) {
                secretBuffer += e.key.toLowerCase();
                if (secretBuffer.length > SECRET_CODE.length) {
                    secretBuffer = secretBuffer.slice(-SECRET_CODE.length);
                }
                if (secretBuffer === SECRET_CODE) {
                    p1GodMode = !p1GodMode;
                    secretBuffer = '';
                    if (p1GodMode) {
                        players[0].el.style.boxShadow = '0 0 25px 10px rgba(255, 215, 0, 0.8)';
                        players[0].el.style.border = '3px solid gold';
                    } else {
                        players[0].el.style.boxShadow = '';
                        players[0].el.style.border = '';
                        updateItDisplay();
                    }
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
            keys[e.key.toLowerCase()] = false;
        });
    </script>
</body>
</html>
