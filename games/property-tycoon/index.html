<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Property Tycoon</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;background:#0b1020;color:#fff;min-height:100vh;padding:12px}.top{display:flex;justify-content:space-between;align-items:center;gap:10px;max-width:1400px;margin:auto auto 12px;flex-wrap:wrap}h1{font-size:clamp(1.7rem,4vw,3rem)}a{color:#67e8f9;text-decoration:none;font-weight:700}.wrap{max-width:1400px;margin:auto;display:grid;grid-template-columns:minmax(300px,1fr) 340px;gap:14px}.board{display:grid;grid-template-columns:repeat(11,1fr);grid-template-rows:repeat(11,1fr);aspect-ratio:1/1;background:#111827;border:5px solid #f8fafc;border-radius:20px;overflow:hidden}.cell{border:1px solid rgba(255,255,255,.2);padding:4px;font-size:clamp(.45rem,1vw,.8rem);background:#1f2937;position:relative;display:flex;flex-direction:column;justify-content:space-between}.corner{display:flex;align-items:center;justify-content:center;font-weight:900;text-align:center}.center{grid-column:2/11;grid-row:2/11;background:linear-gradient(135deg,#111827,#1e293b);display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}.center h2{font-size:clamp(2rem,6vw,5rem)}.stripe{height:8px;border-radius:99px}.brown{background:#8b5a2b}.cyan{background:#38bdf8}.pink{background:#ec4899}.orange{background:#fb923c}.red{background:#ef4444}.yellow{background:#fde047}.green{background:#22c55e}.blue{background:#3b82f6}.panel{background:#111827;border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:16px}.players{display:grid;gap:8px;margin:14px 0}.player{padding:10px;border-radius:12px;background:#1f2937;border:1px solid rgba(255,255,255,.12)}.active{outline:2px solid #67e8f9}button,select{width:100%;padding:13px;border:0;border-radius:12px;font-weight:800;margin:6px 0}button{background:linear-gradient(135deg,#67e8f9,#a7f3d0);cursor:pointer}.log{height:220px;overflow:auto;background:#020617;border-radius:12px;padding:10px;margin-top:10px;font-size:.9rem}.token{width:16px;height:16px;border-radius:50%;position:absolute;border:2px solid #fff;bottom:3px}.tiny{font-size:.85rem;color:#cbd5e1;line-height:1.4}@media(max-width:1000px){.wrap{grid-template-columns:1fr}}@media(max-width:650px){body{padding:6px}.panel{padding:10px}}</style></head><body><div class="top"><div><h1>🏙️ Property Tycoon</h1><div class="tiny">Responsive 2-6 player property board game.</div></div><a href="../../">← Back</a></div><div class="wrap"><div class="board" id="board"><div class="center"><div><h2>PROPERTY<br>TYCOON</h2><p>Buy. Rent. Win.</p></div></div></div><div class="panel"><h2 id="turn">Player 1 Turn</h2><p class="tiny">Roll dice, buy properties, collect rent, and bankrupt everyone else.</p><label>Players</label><select id="count"><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option></select><button id="start">Start Game</button><div class="players" id="players"></div><button id="roll" disabled>🎲 Roll Dice</button><button id="buy" disabled>🏠 Buy Property</button><button id="end" disabled>End Turn</button><button onclick="location.reload()">Restart</button><div class="log" id="log"></div></div></div><script>const spaces=[{n:'GO',t:'corner'},{n:'Old Dock',p:60,r:10,c:'brown'},{n:'Chest',t:'bonus'},{n:'Maple Ave',p:80,r:14,c:'brown'},{n:'Tax',t:'tax',a:120},{n:'Rail Hub',p:100,r:20,c:'cyan'},{n:'Cloud Ln',p:120,r:24,c:'cyan'},{n:'Chance',t:'chance'},{n:'Sky St',p:140,r:28,c:'cyan'},{n:'Jail',t:'corner'},{n:'Pixel Plaza',p:160,r:34,c:'pink'},{n:'Power Co',p:180,r:38,c:'pink'},{n:'Neon Rd',p:200,r:42,c:'pink'},{n:'Arcade Ave',p:220,r:48,c:'orange'},{n:'Bus Stop',p:240,r:52,c:'orange'},{n:'Free Park',t:'corner'},{n:'Rocket Rd',p:260,r:58,c:'red'},{n:'Vault',t:'bonus'},{n:'Laser Lane',p:280,r:64,c:'red'},{n:'Coin Blvd',p:300,r:70,c:'yellow'},{n:'Go To Start',t:'corner'},{n:'Gold Grove',p:320,r:76,c:'yellow'},{n:'Chance',t:'chance'},{n:'Emerald St',p:340,r:82,c:'green'},{n:'Diamond Dr',p:360,r:88,c:'green'},{n:'Airport',p:380,r:96,c:'green'},{n:'Mega Tax',t:'tax',a:200},{n:'Blue Tower',p:400,r:110,c:'blue'}];const coords=[[11,11],[11,10],[11,9],[11,8],[11,7],[11,6],[11,5],[11,4],[11,3],[11,1],[10,1],[9,1],[8,1],[7,1],[6,1],[1,1],[1,3],[1,4],[1,5],[1,6],[1,11],[3,11],[4,11],[5,11],[6,11],[7,11],[8,11],[9,11]];const colors=['#ff3366','#38bdf8','#22c55e','#fde047','#a855f7','#fb923c'];let players=[];let owners=Array(spaces.length).fill(null);let current=0;let rolled=false;let canBuy=false;const board=document.getElementById('board');const logBox=document.getElementById('log');function makeBoard(){spaces.forEach((s,i)=>{const d=document.createElement('div');d.className='cell'+(s.t==='corner'?' corner':'');d.id='s'+i;d.style.gridRow=coords[i][0];d.style.gridColumn=coords[i][1];let h='';if(s.c)h+='<div class="stripe '+s.c+'"></div>';h+='<strong>'+s.n+'</strong>';if(s.p)h+='$'+s.p+'<br>Rent $'+s.r;if(s.t==='tax')h+='Pay $'+s.a;d.innerHTML=h;board.appendChild(d)})}function draw(){document.querySelectorAll('.token').forEach(t=>t.remove());players.forEach((p,i)=>{const t=document.createElement('div');t.className='token';t.style.background=colors[i];t.style.left=(10+i*12)+'%';document.getElementById('s'+p.pos).appendChild(t)})}function renderPlayers(){const el=document.getElementById('players');el.innerHTML='';players.forEach((p,i)=>{const d=document.createElement('div');d.className='player'+(i===current?' active':'');d.innerHTML='<strong>Player '+(i+1)+'</strong><br>Money: $'+p.money+'<br>Properties: '+p.props.length;el.appendChild(d)});document.getElementById('turn').textContent='Player '+(current+1)+' Turn';draw()}function log(t){logBox.innerHTML='<div>• '+t+'</div>'+logBox.innerHTML}function checkWin(){const alive=players.filter(p=>!p.out);if(alive.length===1){log('🏆 Player '+(players.indexOf(alive[0])+1)+' wins!');document.getElementById('roll').disabled=true;document.getElementById('buy').disabled=true;document.getElementById('end').disabled=true}}function nextPlayer(){do{current=(current+1)%players.length}while(players[current].out)}function updateButtons(){document.getElementById('roll').disabled=rolled;document.getElementById('buy').disabled=!canBuy;document.getElementById('end').disabled=!rolled}document.getElementById('start').onclick=()=>{const c=parseInt(document.getElementById('count').value);players=[];for(let i=0;i<c;i++)players.push({money:1500,pos:0,props:[],out:false});document.getElementById('roll').disabled=false;renderPlayers();log('Started '+c+' player game.')};document.getElementById('roll').onclick=()=>{const p=players[current];const d=Math.floor(Math.random()*6)+1;const old=p.pos;p.pos=(p.pos+d)%spaces.length;if(p.pos<old){p.money+=200;log('Player '+(current+1)+' passed GO and collected $200')}log('Player '+(current+1)+' rolled '+d);const s=spaces[p.pos];canBuy=false;if(s.p){if(owners[p.pos]==null){if(p.money>=s.p){canBuy=true;log('Available to buy: '+s.n+' for $'+s.p)}}else if(owners[p.pos]!==current){const owner=players[owners[p.pos]];p.money-=s.r;owner.money+=s.r;log('Paid $'+s.r+' rent to Player '+(owners[p.pos]+1))}}else if(s.t==='tax'){p.money-=s.a;log('Paid tax of $'+s.a)}else if(s.t==='bonus'){p.money+=150;log('Bonus! +$150')}else if(s.t==='chance'){const amt=Math.random()>.5?200:-150;p.money+=amt;log((amt>0?'Won ':'Lost $')+Math.abs(amt))}if(p.money<0){p.out=true;log('Player '+(current+1)+' is bankrupt!')}rolled=true;renderPlayers();updateButtons();checkWin()};document.getElementById('buy').onclick=()=>{const p=players[current];const s=spaces[p.pos];if(!s.p)return;p.money-=s.p;owners[p.pos]=current;p.props.push(s.n);document.getElementById('s'+p.pos).style.boxShadow='inset 0 0 0 4px '+colors[current];canBuy=false;log('Player '+(current+1)+' bought '+s.n);renderPlayers();updateButtons()};document.getElementById('end').onclick=()=>{rolled=false;canBuy=false;nextPlayer();renderPlayers();updateButtons()};makeBoard();</script></body></html>
