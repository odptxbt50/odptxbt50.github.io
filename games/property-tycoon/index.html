<!doctype html><html><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Game Tycoon</title><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel=stylesheet><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#05060c;color:white;font-family:'Press Start 2P',monospace;padding:16px}a{color:#00f5ff;text-decoration:none}.menu{min-height:88vh;display:flex;align-items:center;justify-content:center;text-align:center}.box{width:min(620px,95vw);background:#090b15;border:2px solid #222a44;padding:28px}.logo{font-size:clamp(1.4rem,5vw,3rem);line-height:1.5}.g{color:#35ff8d}.p{color:#ff5da8}.small{font-size:.6rem;color:#cbd5e1;line-height:1.7}input,select,button{width:min(360px,100%);font-family:inherit;margin:8px;padding:14px;border-radius:8px;background:#121629;color:white;text-align:center}button{cursor:pointer}.y{border:2px solid #ffd600;color:#ffd600}.c{border:2px solid #00f5ff;color:#00f5ff}.m{border:2px solid #ff0077;color:#ff5da8}.game{display:none}.top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}.layout{display:grid;grid-template-columns:minmax(320px,1fr) 360px;gap:14px}.board{display:grid;grid-template-columns:repeat(15,1fr);grid-template-rows:repeat(15,1fr);aspect-ratio:1/1;background:#0b1020;border:4px solid white;border-radius:16px;overflow:hidden}.cell{border:1px solid #3b455e;background:#151c2e;padding:3px;font-size:clamp(.32rem,.72vw,.57rem);line-height:1.35;position:relative;display:flex;flex-direction:column;justify-content:space-between}.corner{align-items:center;justify-content:center;text-align:center}.center{grid-column:2/15;grid-row:2/15;display:flex;align-items:center;justify-content:center;text-align:center;background:radial-gradient(circle,#151b2e,#070914)}.center h2{font-size:clamp(1.5rem,5vw,4.5rem);line-height:1.4}.stripe{height:7px;border-radius:99px}.s1{background:#35ff8d}.s2{background:#00f5ff}.s3{background:#ff5da8}.s4{background:#ffd600}.s5{background:#ff8a00}.s6{background:#a855f7}.panel{background:#090b15;border:2px solid #222a44;border-radius:16px;padding:14px}.players{display:grid;gap:8px;margin:12px 0}.pl{background:#151c2e;border:1px solid #303852;border-radius:10px;padding:9px;font-size:.58rem;line-height:1.6}.active{outline:2px solid #00f5ff}.dead{opacity:.45}.tok{width:14px;height:14px;border-radius:50%;border:2px solid white;position:absolute;bottom:2px}.log{height:210px;overflow:auto;background:#02030a;border-radius:10px;padding:10px;font-family:monospace;font-size:.85rem}.owned{box-shadow:inset 0 0 0 4px var(--o)}@media(max-width:1050px){.layout{grid-template-columns:1fr}.panel{order:-1}}@media(max-width:650px){body{padding:7px}.cell{padding:2px}.tok{width:10px;height:10px}}</style></head><body><section class=menu id=menuScreen><div class=box><div class=logo>🎮 <span class=g>GAME</span> <span class=p>TYCOON</span></div><p class=small>Buy game slots, collect rent, and beat your friends or AI bots.</p><input id=playerName placeholder="Enter name..."><select id=playerCount><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option></select><button class=y onclick="startGame('solo')">SINGLEPLAYER VS AI</button><button class=c onclick="startGame('local')">LOCAL 2-6 PLAYERS</button><button class=m onclick="location.href='../../'">BACK</button></div></section><section class=game id=gameScreen><div class=top><h1>🎮 <span class=g>GAME</span> <span class=p>TYCOON</span></h1><a href=../../>← Back</a></div><div class=layout><div class=board id=board><div class=center><div><h2>GAME<br>TYCOON</h2><p class=small>Buy Studios • Charge Rent • Win</p></div></div></div><aside class=panel><h2 id=turnText>Start</h2><p class=small id=note></p><div class=players id=playersBox></div><button class=y id=rollButton onclick=doRoll() disabled>🎲 ROLL</button><button class=c id=buyButton onclick=doBuy() disabled>BUY GAME</button><button class=m id=endButton onclick=doEnd() disabled>END TURN</button><button onclick=location.reload()>RESTART</button><div class=log id=logBox></div></aside></div></section><script>const gameList=['Counter-Strike 2','Dota 2','PUBG','Apex Legends','Rainbow Six Siege','Call of Duty','Battlefield 6','DOOM Dark Ages','Ready or Not','Escape from Tarkov','Rust','Warframe','Destiny 2','Grand Theft Auto V','Red Dead Redemption 2','Cyberpunk 2077','Elden Ring','Black Myth Wukong','The Witcher 3','Minecraft','Terraria','Subnautica','Subnautica Below Zero','Subnautica 2','Valheim','Palworld','ARK Survival Ascended','Project Zomboid','Raft','The Forest','Sons of the Forest','No Mans Sky','Grounded','Forza Horizon 6','BeamNG.drive','Assetto Corsa','Assetto Corsa Competizione','CarX Drift Racing','Need for Speed Heat','Need for Speed Unbound','F1 25','The Crew Motorfest','Wreckfest','Rocket League','Euro Truck Simulator 2','American Truck Simulator','Among Us','Balatro','Vampire Survivors','Stardew Valley','Hades','Marvel Rivals','Brawlhalla','Path of Exile'];const cols=['#ff3366','#38bdf8','#22c55e','#fde047','#a855f7','#fb923c'];let coords=[],spaces=[],own=[],ps=[],cur=0,rolled=0,can=0,over=0,mode='local';for(let c=15;c>=1;c--)coords.push([15,c]);for(let r=14;r>=1;r--)coords.push([r,1]);for(let c=2;c<=15;c++)coords.push([1,c]);for(let r=2;r<=14;r++)coords.push([r,15]);function mk(){spaces=[];for(let i=0;i<coords.length;i++){if(i==0)spaces.push({n:'START',t:'corner'});else if(i==14)spaces.push({n:'JAIL',t:'corner'});else if(i==28)spaces.push({n:'FREE PLAY',t:'corner'});else if(i==42)spaces.push({n:'GO BACK',t:'corner'});else if(i%10==3)spaces.push({n:'LOOT BOX',t:'bonus'});else if(i%13==5)spaces.push({n:'TAX PATCH',t:'tax',a:120+Math.floor(i/10)*40});else if(i%9==7)spaces.push({n:'RANDOM EVENT',t:'chance'});else{let price=70+i*8;spaces.push({n:gameList[(i*3)%gameList.length],p:price,r:Math.floor(price*.22),s:'s'+((i%6)+1)})}}own=Array(spaces.length).fill(null)}function makeBoard(){document.querySelectorAll('.cell').forEach(e=>e.remove());spaces.forEach((x,i)=>{let d=document.createElement('div');d.id='sp'+i;d.className='cell '+(x.t=='corner'?'corner':'');d.style.gridRow=coords[i][0];d.style.gridColumn=coords[i][1];d.innerHTML=(x.s?'<div class="stripe '+x.s+'"></div>':'')+'<strong>'+x.n+'</strong>'+(x.p?'<span>$'+x.p+'<br>Rent $'+x.r+'</span>':x.a?'Pay $'+x.a:'');document.getElementById('board').appendChild(d)})}function startGame(m){mode=m;mk();makeBoard();let n=+document.getElementById('playerCount').value;let nm=document.getElementById('playerName').value.trim()||'Player 1';ps=[{name:nm,money:1500,pos:0,props:[],ai:0,out:0}];for(let i=1;i<n;i++)ps.push({name:m=='solo'?'AI Bot '+i:'Player '+(i+1),money:1500,pos:0,props:[],ai:m=='solo',out:0});document.getElementById('menuScreen').style.display='none';document.getElementById('gameScreen').style.display='block';document.getElementById('note').textContent=m=='solo'?'Singleplayer: bots roll, buy, and play by themselves.':'Local mode: pass the device around.';logMsg('Started '+n+' player game.');show();setButtons()}function show(){let box=document.getElementById('playersBox');box.innerHTML='';ps.forEach((p,i)=>{let d=document.createElement('div');d.className='pl '+(i==cur?'active ':'')+(p.out?'dead':'');d.innerHTML='<b style="color:'+cols[i]+'">'+p.name+(p.ai?' 🤖':'')+'</b><br>Money: $'+p.money+'<br>Games: '+p.props.length;box.appendChild(d)});document.getElementById('turnText').textContent=ps[cur].name+' Turn';document.querySelectorAll('.tok').forEach(e=>e.remove());ps.forEach((p,i)=>{if(p.out)return;let t=document.createElement('div');t.className='tok';t.style.background=cols[i];t.style.left=(6+(i%3)*30)+'%';t.style.bottom=(2+Math.floor(i/3)*15)+'px';document.getElementById('sp'+p.pos).appendChild(t)})}function logMsg(t){document.getElementById('logBox').innerHTML='<div>• '+t+'</div>'+document.getElementById('logBox').innerHTML}function setButtons(){let ai=ps[cur]&&ps[cur].ai;document.getElementById('rollButton').disabled=rolled||over||ai;document.getElementById('buyButton').disabled=!can||over||ai;document.getElementById('endButton').disabled=!rolled||over||ai}function doRoll(){if(rolled||over)return;let p=ps[cur],d=Math.floor(Math.random()*6)+1,old=p.pos;p.pos=(p.pos+d)%spaces.length;if(p.pos<old){p.money+=200;logMsg(p.name+' passed START +$200')}logMsg(p.name+' rolled '+d);land();rolled=1;show();setButtons();checkWin()}function land(){let p=ps[cur],x=spaces[p.pos];can=0;if(x.p){if(own[p.pos]==null){if(p.money>=x.p){can=1;logMsg(x.n+' is available for $'+x.p)}}else if(own[p.pos]!=cur){let o=ps[own[p.pos]];p.money-=x.r;o.money+=x.r;logMsg(p.name+' paid $'+x.r+' to '+o.name)}}else if(x.t=='bonus'){p.money+=150;logMsg(p.name+' got loot box +$150')}else if(x.t=='tax'){p.money-=x.a;logMsg(p.name+' paid tax $'+x.a)}else if(x.t=='chance'){let a=Math.random()>.5?220:-160;p.money+=a;logMsg(p.name+(a>0?' got sponsor +$':' got bad review -$')+Math.abs(a))}if(p.money<0){p.out=1;logMsg(p.name+' is bankrupt!')}}function doBuy(){let p=ps[cur],x=spaces[p.pos];if(!can||!x.p)return;p.money-=x.p;own[p.pos]=cur;p.props.push(x.n);let cell=document.getElementById('sp'+p.pos);cell.classList.add('owned');cell.style.setProperty('--o',cols[cur]);can=0;logMsg(p.name+' bought '+x.n);show();setButtons()}function doEnd(){rolled=0;can=0;do{cur=(cur+1)%ps.length}while(ps[cur].out);show();setButtons();if(ps[cur].ai)setTimeout(aiTurn,600)}function aiTurn(){if(over)return;doRoll();let p=ps[cur],x=spaces[p.pos];if(can&&x.p&&(p.money>x.p+180||Math.random()>.35))doBuy();setTimeout(doEnd,700)}function checkWin(){let alive=ps.filter(p=>!p.out);if(alive.length==1){over=1;logMsg('🏆 '+alive[0].name+' wins!')}setButtons()}</script></body></html>
