<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Game Tycoon</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}body{margin:0;background:#06070d;color:white;font-family:'Press Start 2P',monospace;padding:14px}button,select,input{font-family:inherit}a{color:#00eaff;text-decoration:none}.menu{min-height:90vh;display:flex;align-items:center;justify-content:center;text-align:center}.box{background:#0a0d18;border:2px solid #27304f;width:min(620px,95vw);padding:28px}.logo{font-size:clamp(1.5rem,5vw,3.2rem);line-height:1.5}.green{color:#33ff88}.pink{color:#ff5da8}.small{font-size:.6rem;line-height:1.7;color:#cbd5e1}input,select,button{width:min(380px,100%);padding:14px;margin:8px;border-radius:8px;background:#15182b;color:white;border:2px solid #333;text-align:center}button{cursor:pointer}.yellow{border-color:#ffd600;color:#ffd600}.cyan{border-color:#00eaff;color:#00eaff}.mag{border-color:#ff0077;color:#ff5da8}.game{display:none}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px}.layout{display:grid;grid-template-columns:minmax(320px,1fr) 360px;gap:14px}.board{display:grid;grid-template-columns:repeat(9,1fr);grid-template-rows:repeat(9,1fr);aspect-ratio:1/1;background:#101827;border:4px solid #fff;border-radius:16px;overflow:hidden}.cell{background:#172033;border:1px solid #3b455e;font-size:clamp(.42rem,1vw,.7rem);line-height:1.35;padding:4px;position:relative;display:flex;flex-direction:column;justify-content:space-between}.corner{align-items:center;justify-content:center;text-align:center}.center{grid-column:2/9;grid-row:2/9;background:radial-gradient(circle,#182136,#070914);display:flex;align-items:center;justify-content:center;text-align:center}.center h2{font-size:clamp(1.7rem,5vw,4rem);line-height:1.4}.bar{height:7px;border-radius:99px}.b1{background:#33ff88}.b2{background:#00eaff}.b3{background:#ff5da8}.b4{background:#ffd600}.b5{background:#ff8a00}.b6{background:#a855f7}.panel{background:#0a0d18;border:2px solid #27304f;border-radius:16px;padding:14px}.player{background:#172033;border:1px solid #33415f;border-radius:10px;padding:9px;margin:8px 0;font-size:.58rem;line-height:1.6}.active{outline:2px solid #00eaff}.token{width:14px;height:14px;border-radius:50%;border:2px solid white;position:absolute;bottom:3px}.owned{box-shadow:inset 0 0 0 4px var(--own)}.log{height:210px;overflow:auto;background:#02030a;border-radius:10px;padding:10px;font-family:monospace;font-size:.85rem;line-height:1.35;margin-top:10px}.dead{opacity:.4}@media(max-width:950px){.layout{grid-template-columns:1fr}.panel{order:-1}}@media(max-width:600px){body{padding:6px}.cell{font-size:.36rem;padding:2px}.token{width:10px;height:10px}}
</style>
</head>
<body>
<section id="menu" class="menu"><div class="box"><div class="logo">🎮 <span class="green">GAME</span> <span class="pink">TYCOON</span></div><p class="small">Buy video game spaces, collect rent, and defeat friends or AI bots.</p><input id="pname" placeholder="Enter name"><select id="pcount"><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option></select><br><button id="solo" class="yellow">SINGLEPLAYER VS AI</button><button id="local" class="cyan">LOCAL 2-6 PLAYERS</button><button id="back" class="mag">BACK</button></div></section>
<section id="game" class="game"><div class="top"><h1>🎮 <span class="green">GAME</span> <span class="pink">TYCOON</span></h1><a href="../../">← Back</a></div><div class="layout"><div id="board" class="board"><div class="center"><div><h2>GAME<br>TYCOON</h2><p class="small">Buy • Rent • Win</p></div></div></div><aside class="panel"><h2 id="turn">Start</h2><p id="note" class="small"></p><div id="players"></div><button id="roll" class="yellow">🎲 ROLL</button><button id="buy" class="cyan">BUY GAME</button><button id="end" class="mag">END TURN</button><button id="restart">RESTART</button><div id="log" class="log"></div></aside></div></section>
<script>
const games=['Counter-Strike 2','Dota 2','PUBG','Apex Legends','Rainbow Six Siege','Call of Duty','Battlefield 6','DOOM Dark Ages','Ready or Not','Escape from Tarkov','Rust','Warframe','Destiny 2','Grand Theft Auto V','Red Dead Redemption 2','Cyberpunk 2077','Elden Ring','Black Myth Wukong','The Witcher 3','Minecraft','Terraria','Subnautica','Valheim','Palworld','ARK Survival Ascended','Project Zomboid','Raft','The Forest','No Mans Sky','Grounded','Forza Horizon 6','BeamNG.drive','Assetto Corsa','Need for Speed Heat','F1 25','Rocket League','Among Us','Balatro','Vampire Survivors','Stardew Valley','Hades','Marvel Rivals','Brawlhalla','Path of Exile'];
const colors=['#ff3366','#38bdf8','#22c55e','#fde047','#a855f7','#fb923c'];
const coords=[];for(let c=9;c>=1;c--)coords.push([9,c]);for(let r=8;r>=1;r--)coords.push([r,1]);for(let c=2;c<=9;c++)coords.push([1,c]);for(let r=2;r<=8;r++)coords.push([r,9]);
let spaces=[],owners=[],players=[],turnIndex=0,hasRolled=false,canBuy=false,gameOver=false;
function el(id){return document.getElementById(id)}
function makeSpaces(){spaces=[];for(let i=0;i<coords.length;i++){if(i===0)spaces.push({name:'START',type:'corner'});else if(i===8)spaces.push({name:'JAIL',type:'corner'});else if(i===16)spaces.push({name:'FREE PLAY',type:'corner'});else if(i===24)spaces.push({name:'GO BACK',type:'corner'});else if(i%7===3)spaces.push({name:'LOOT BOX',type:'bonus'});else if(i%11===5)spaces.push({name:'TAX PATCH',type:'tax',amount:150});else{let price=80+i*12;spaces.push({name:games[(i*2)%games.length],price:price,rent:Math.floor(price*.25),bar:'b'+((i%6)+1)})}}owners=Array(spaces.length).fill(-1)}
function drawBoard(){document.querySelectorAll('.cell').forEach(x=>x.remove());spaces.forEach((s,i)=>{let d=document.createElement('div');d.className='cell '+(s.type==='corner'?'corner':'');d.id='space'+i;d.style.gridRow=coords[i][0];d.style.gridColumn=coords[i][1];d.innerHTML=(s.bar?'<div class="bar '+s.bar+'"></div>':'')+'<b>'+s.name+'</b>'+(s.price?'<span>$'+s.price+'<br>Rent $'+s.rent+'</span>':s.amount?'<span>Pay $'+s.amount+'</span>':'');el('board').appendChild(d)})}
function start(mode){makeSpaces();drawBoard();let count=Number(el('pcount').value);let first=el('pname').value.trim()||'Player 1';players=[{name:first,money:1500,pos:0,props:[],ai:false,out:false}];for(let i=1;i<count;i++)players.push({name:mode==='solo'?'AI Bot '+i:'Player '+(i+1),money:1500,pos:0,props:[],ai:mode==='solo',out:false});turnIndex=0;hasRolled=false;canBuy=false;gameOver=false;el('menu').style.display='none';el('game').style.display='block';el('note').textContent=mode==='solo'?'Singleplayer: AI bots take turns automatically.':'Local mode: pass the device around.';log('Game started.');render();buttons()}
function render(){el('players').innerHTML='';players.forEach((p,i)=>{let d=document.createElement('div');d.className='player '+(i===turnIndex?'active ':'')+(p.out?'dead':'');d.innerHTML='<b style="color:'+colors[i]+'">'+p.name+(p.ai?' 🤖':'')+'</b><br>Money: $'+p.money+'<br>Games: '+p.props.length;el('players').appendChild(d)});el('turn').textContent=players[turnIndex].name+' Turn';document.querySelectorAll('.token').forEach(t=>t.remove());players.forEach((p,i)=>{if(p.out)return;let t=document.createElement('div');t.className='token';t.style.background=colors[i];t.style.left=(7+(i%3)*30)+'%';t.style.bottom=(3+Math.floor(i/3)*15)+'px';el('space'+p.pos).appendChild(t)})}
function log(t){el('log').innerHTML='<div>• '+t+'</div>'+el('log').innerHTML}
function buttons(){let ai=players[turnIndex]&&players[turnIndex].ai;el('roll').disabled=hasRolled||gameOver||ai;el('buy').disabled=!canBuy||gameOver||ai;el('end').disabled=!hasRolled||gameOver||ai}
function roll(){if(hasRolled||gameOver)return;let p=players[turnIndex];let dice=Math.floor(Math.random()*6)+1;let old=p.pos;p.pos=(p.pos+dice)%spaces.length;if(p.pos<old){p.money+=200;log(p.name+' passed START and got $200')}log(p.name+' rolled '+dice);land();hasRolled=true;render();checkWin();buttons()}
function land(){let p=players[turnIndex],s=spaces[p.pos];canBuy=false;if(s.price){if(owners[p.pos]===-1){if(p.money>=s.price){canBuy=true;log(s.name+' is available for $'+s.price)}}else if(owners[p.pos]!==turnIndex){let owner=players[owners[p.pos]];p.money-=s.rent;owner.money+=s.rent;log(p.name+' paid $'+s.rent+' to '+owner.name)}}else if(s.type==='bonus'){p.money+=150;log(p.name+' got a loot box +$150')}else if(s.type==='tax'){p.money-=s.amount;log(p.name+' paid tax $'+s.amount)}else{log(p.name+' landed on '+s.name)}if(p.money<0){p.out=true;log(p.name+' went bankrupt!')}}
function buy(){let p=players[turnIndex],s=spaces[p.pos];if(!canBuy||!s.price)return;p.money-=s.price;owners[p.pos]=turnIndex;p.props.push(s.name);let cell=el('space'+p.pos);cell.classList.add('owned');cell.style.setProperty('--own',colors[turnIndex]);canBuy=false;log(p.name+' bought '+s.name);render();buttons()}
function endTurn(){hasRolled=false;canBuy=false;do{turnIndex=(turnIndex+1)%players.length}while(players[turnIndex].out);render();buttons();if(players[turnIndex].ai)setTimeout(aiTurn,600)}
function aiTurn(){if(gameOver)return;roll();let p=players[turnIndex],s=spaces[p.pos];if(canBuy&&s.price&&(p.money>s.price+200||Math.random()>.45))buy();setTimeout(endTurn,700)}
function checkWin(){let alive=players.filter(p=>!p.out);if(alive.length===1){gameOver=true;log('🏆 '+alive[0].name+' wins!')}}
el('solo').onclick=()=>start('solo');el('local').onclick=()=>start('local');el('back').onclick=()=>location.href='../../';el('roll').onclick=roll;el('buy').onclick=buy;el('end').onclick=endTurn;el('restart').onclick=()=>location.reload();buttons();
</script>
</body>
</html>
